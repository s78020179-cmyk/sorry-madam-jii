<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorry Madam Ji 💖</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    text-align:center;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    overflow:hidden;
}

/* Floating hearts */
.heart{
    position:absolute;
    color:white;
    font-size:25px;
    animation: float 6s linear infinite;
}

@keyframes float{
    0%{transform: translateY(100vh); opacity:0;}
    50%{opacity:1;}
    100%{transform: translateY(-10vh); opacity:0;}
}

.container{
    margin-top:150px;
    animation: fadeIn 2s;
}

h1{
    font-size:50px;
    color:white;
}

p{
    font-size:22px;
    color:white;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
    background:#ff1e4d;
}

#message{
    margin-top:20px;
    font-size:24px;
    color:white;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
<h1>Sorry Madam Ji 🥺💖</h1>

<p>I know I made a mistake 😔</p>
<p>Please forgive me Madam Ji 💕</p>
<p>You are the cutest person in my life 😭💖</p>

<button onclick="showMessage()">Click if you forgive me 👉👈</button>

<div id="message"></div>
</div>

<script>
function showMessage(){
document.getElementById("message").innerHTML=
"Yayyy!! 😍 Thank you Madam Ji 💖 I promise I will not repeat my mistake 🥺💕";
}

/* create floating hearts */
for(let i=0;i<30;i++){
let heart=document.createElement("div");
heart.innerHTML="💖";
heart.className="heart";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(3+Math.random()*5)+"s";
document.body.appendChild(heart);
}
</script>

</body>
</html>
